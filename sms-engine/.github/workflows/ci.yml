name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  safety-regression:
    name: Safety and regression checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      CI: true
      NEXT_TELEMETRY_DISABLED: "1"
      MESSAGING_PROVIDER: MOCK

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Staging baseline tests
        run: npm run test:staging-baseline

      - name: Twilio readiness tests
        run: npm run test:twilio-readiness

      - name: AI reliability evals
        run: npm run test:ai-evals
